name: Price Monitor

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  scrape-and-store:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install runtime tools
        run: npm install --no-save playwright tsx

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run price monitor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CAD_TO_USD: ${{ secrets.CAD_TO_USD }}
          COSTCO_US: ${{ secrets.COSTCO_US }}
          MICROCENTER: ${{ secrets.MICROCENTER }}
        run: npx tsx automation/price-monitor/run.ts
