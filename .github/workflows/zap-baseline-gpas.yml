name: ZAP Baseline Scan - GPAS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  issues: write

concurrency:
  group: zap-baseline-gpas
  cancel-in-progress: false

jobs:
  zap-baseline:
    name: Scan https://gpas.nh.ac.cn
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: ghcr.io/zaproxy/zaproxy:stable
          target: https://gpas.nh.ac.cn
          rules_file_name: .zap/rules.tsv
          cmd_options: "-a -j -m 3 -T 15 -I"
          artifact_name: zap-baseline-gpas
          issue_title: "ZAP Baseline Scan Report: gpas.nh.ac.cn"
          fail_action: false
